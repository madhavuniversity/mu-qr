 bg-orange-500 px-6 py-2"onclick=closeAlert()>Got it</button></div></div></div><footer class="text-slate-400 mt-8 pb-8 space-y-4 text-center"><div class="flex items-center flex-col space-y-2"><p class="font-medium text-sm">Created by <span class=text-slate-600><a class="hover:text-orange-600 text-slate-600"href=https://itcell.madhavuniversity.edu.in target=_blank>IT Department of Madhav University</a></span></p><a class="font-semibold text-xs hover:text-orange-600 text-orange-500 transition-colors"href=https://madhavuniversity.edu.in target=_blank>www.madhavuniversity.edu.in</a></div><div class="flex justify-center space-x-6"><a class="text-slate-400 transition-colors hover:text-blue-600"href=https://www.facebook.com/MadhavUniversity/ target=_blank><svg class="h-5 w-5"fill=currentColor viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg> </a><a class="text-slate-400 transition-colors hover:text-pink-600"href=https://www.instagram.com/madhavuniversity/ target=_blank><svg class="h-5 w-5"fill=currentColor viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.668-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg> </a><a class="text-slate-400 transition-colors hover:text-blue-700"href=https://www.linkedin.com/school/madhav-university/ target=_blank><svg class="h-5 w-5"fill=currentColor viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg> </a><a class="text-slate-400 transition-colors hover:text-black"href=https://x.com/madhavuniversty target=_blank><svg class="h-5 w-5"fill=currentColor viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a></div></footer><script>// Sync color text inputs
        document.getElementById('color').oninput = function() { document.getElementById('colorVal').innerText = this.value.toUpperCase(); };
        document.getElementById('bg').oninput = function() { document.getElementById('bgVal').innerText = this.value.toUpperCase(); };

        function showAlert(msg) {
            document.getElementById('alertMessage').innerText = msg;
            document.getElementById('customAlert').classList.remove('hidden');
        }

        function closeAlert() {
            document.getElementById('customAlert').classList.add('hidden');
        }

        async function generateQR() {
            const urlInput = document.getElementById("url");
            const url = urlInput.value.trim();
            
            if (!url) {
                showAlert("Please paste a link or enter text.");
                return;
            }

            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const outputArea = document.getElementById('outputArea');
            const qrDiv = document.getElementById("qrcode");
            
            loader.style.display = 'inline-block';
            btnText.innerText = "Generating...";
            qrDiv.innerHTML = "";

            const color = document.getElementById("color").value;
            const bg = document.getElementById("bg").value;
            const size = parseInt(document.getElementById("size").value);

            // Generate the QR code using the library
            new QRCode(qrDiv, {
                text: url,
                width: size,
                height: size,
                colorDark: color,
                colorLight: bg,
                correctLevel: QRCode.CorrectLevel.H
            });

            // Delay to ensure the library has finished drawing to the canvas
            setTimeout(async () => {
                const canvas = qrDiv.querySelector('canvas');
                if (canvas) {
                    try {
                        await drawLogoImage(canvas, size, bg);
                        outputArea.classList.remove('hidden');
                        loader.style.display = 'none';
                        btnText.innerText = "Generate QR Code";
                        outputArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    } catch (err) {
                        console.error("Logo Error:", err);
                    }
                } else {
                    setTimeout(generateQR, 200);
                }
            }, 500);
        }

        /**
         * Loads alogo.png and draws it onto the canvas with aspect ratio preservation.
         */
        function drawLogoImage(canvas, size, bgColor) {
            return new Promise((resolve) => {
                const ctx = canvas.getContext('2d');
                const logo = new Image();
                logo.src = "alogo.png";
                
                logo.onload = function() {
                    const originalWidth = logo.naturalWidth;
                    const originalHeight = logo.naturalHeight;
                    const aspectRatio = originalHeight / originalWidth;

                    // Set target width (18% of QR size) and calculate height based on ratio (height: auto)
                    const drawWidth = size * 0.18;
                    const drawHeight = drawWidth * aspectRatio;

                    // Padding area size
                    const padding = 12;
                    const bgWidth = drawWidth + padding;
                    const bgHeight = drawHeight + padding;

                    const centerX = size / 2;
                    const centerY = size / 2;

                    // 1. Draw background plate (centered)
                    ctx.fillStyle = bgColor;
                    ctx.beginPath();
                    ctx.roundRect(centerX - (bgWidth / 2), centerY - (bgHeight / 2), bgWidth, bgHeight, 10);
                    ctx.fill();

                    // 2. Draw actual Logo
                    ctx.drawImage(logo, centerX - (drawWidth / 2), centerY - (drawHeight / 2), drawWidth, drawHeight);
                    resolve();
                };

                logo.onerror = function() {
                    console.warn("alogo.png not found. Falling back to text logo.");
                    const fallbackSize = size * 0.18;
                    const centerX = size / 2;
                    const centerY = size / 2;
                    
                    ctx.fillStyle = bgColor;
                    ctx.beginPath();
                    ctx.roundRect(centerX - (fallbackSize/2 + 6), centerY - (fallbackSize/2 + 6), fallbackSize + 12, fallbackSize + 12, 10);
                    ctx.fill();

                    ctx.fillStyle = "#f97316"; 
                    ctx.beginPath();
                    ctx.roundRect(centerX - (fallbackSize/2), centerY - (fallbackSize/2), fallbackSize, fallbackSize, 8);
                    ctx.fill();
                    
                    ctx.fillStyle = "white";
                    ctx.font = `bold ${fallbackSize * 0.45}px Inter`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("MU", centerX, centerY);
                    resolve();
                };
            });
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                showAlert("QR Code not found. Please regenerate.");
                return;
            }

            try {
                // toDataURL captures the current state of the canvas, including the logo
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = image;
                link.download = `MU-QR-${Date.now()}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                console.error(err);
                showAlert("Download failed. This might happen if the image is cross-origin or the browser blocks programmatic downloads.");
            }
        }</script>
